name: Track PR Status

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours (was daily — bumped for ~50 PRs/day cadence)
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: write  # needed to dispatch auditor-case-study.yml (GITHUB_TOKEN label events don't trigger other workflows)

concurrency:
  group: nlpm-track
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Check submitted PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source auditor/scripts/log-event.sh

          # Outcome detection patterns. Case-insensitive grep.
          # Both are passed to `grep -E "$VAR"` — regex alternation only; no shell
          # interpolation of metachars. If you add a pattern containing `$`, backtick,
          # or `\`, double-check it renders literally in grep.
          #
          # "applied_separately" = PR closed unmerged, but maintainer comment indicates fix was applied
          # The "closing in favor of #N" / "consolidated fix in #N" / "covered by #N" group
          # was added 2026-05-01 after agent-sh/agnix#828-830: avifenesh closed three of our PRs
          # with "the issue you flagged is real. Closing in favor of the consolidated structural
          # fix in #840" — a clear applied_separately signal that the previous regex didn't catch.
          # The "already (been )? resolved|fixed|merged|addressed" + "resolved on (main|...)" group
          # was added 2026-05-09 after tanweai/pua#154-#155: tanweai closed two of our PRs with
          # "Closing this PR because the same issue has already been resolved on current main.
          # Resolution evidence: ..." — explicit applied_separately language plus concrete
          # citations of the post-fix state, which the previous regex didn't catch.
          APPLIED_PATTERNS='applied in|applied directly|applied to|applied as|merged into|fixed in release|fixed in v|fixed on main|included in|will be in|already in|already fixed|closing in favor of|consolidated.*fix|covered by #[0-9]+|superseded by #[0-9]+|addressed (in|by) #[0-9]+|handled in #[0-9]+|favor of #[0-9]+|will be (addressed|handled|fixed) in|already (been )?(resolved|fixed|merged|addressed|handled|done)|resolved (in|on) (main|master|trunk|the default|current)|done (in|on) (main|master|trunk)|fixed (in|on) (main|master|trunk|current)|resolution evidence'
          # "rule_adopted" = maintainer opened a hardening/backfill PR that goes beyond our scope.
          # "sibling" intentionally excluded: too generic (e.g. "sibling PRs #123-#125" in
          # a comment about naming conventions is not rule-adoption).
          ADOPTION_PATTERNS='hardening PR|backfill|backfilling|hardening.*#[0-9]+|CHANGELOG.*NLPM|CHANGELOG.*audit'

          # Re-check contributed + tracked + complete. Maintainers can backfill / adopt rules
          # weeks after the case study publishes; we want those signals captured retroactively.
          #
          # NOTE: the loop body runs in a subshell (pipe-to-while). Variables set inside the
          # loop (RULE_ADOPTED, CURRENT_STATUS, per-PR state) do NOT survive past `done`.
          # Aggregate summaries are computed by reading the mutated registry AFTER the loop,
          # in the separate "Log and commit" step below. Do not try to accumulate counts
          # here in shell variables — they will be lost.
          jq -c '.repos | to_entries[] | select(.value.status == "contributed" or .value.status == "tracked" or .value.status == "complete")' auditor/registry/repos.json | while read -r entry; do
            REPO=$(echo "$entry" | jq -r '.key')
            ISSUE_NUM=$(echo "$entry" | jq -r '.value.audit_issue')
            # Snapshot the status BEFORE this loop's updates. We only promote/dispatch
            # on the first transition; later runs (for rule-adoption rescan) must not
            # re-fire case-study or downgrade status.
            CURRENT_STATUS=$(echo "$entry" | jq -r '.value.status')
            echo "Checking PRs for $REPO... (status=$CURRENT_STATUS)"

            # Snapshot prior PR outcomes before overwriting them — needed to detect
            # state transitions so finding_outcome / pr_comments_snapshot are emitted
            # exactly once per transition (SCHEMAS §finding_outcome).
            OLD_PRS=$(jq -c --arg name "$REPO" '.repos[$name].prs // []' auditor/registry/repos.json)

            # Query only PRs we created (stored in pipeline_prs)
            PR_NUMS=$(echo "$entry" | jq -r '.value.pipeline_prs // [] | .[]')
            PRS="[]"
            RULE_ADOPTED="false"
            if [ -n "$PR_NUMS" ]; then
              ITEMS="[]"
              for pr_num in $PR_NUMS; do
                # Fetch PR data, body, and comments in one call. body carries the
                # nlpm-metadata block that joins this PR back to finding fingerprints.
                PR_JSON=$(gh pr view "$pr_num" --repo "$REPO" \
                  --json number,state,mergedAt,closedAt,title,body,updatedAt,createdAt,comments,statusCheckRollup 2>/dev/null || echo "")
                if [ -z "$PR_JSON" ]; then
                  sleep 0.5
                  continue
                fi

                PR_DATA=$(printf '%s' "$PR_JSON" | jq -c '{number, state, mergedAt, closedAt, title, updatedAt, createdAt}')
                COMMENTS_ARR=$(printf '%s' "$PR_JSON" | jq -c '.comments // []')
                PR_BODY=$(printf '%s' "$PR_JSON" | jq -r '.body // ""')
                CHECKS_ARR=$(printf '%s' "$PR_JSON" | jq -c '.statusCheckRollup // []')

                RAW_STATE=$(echo "$PR_DATA" | jq -r '.state')
                MERGED_AT=$(echo "$PR_DATA" | jq -r '.mergedAt // ""')
                UPDATED_AT=$(echo "$PR_DATA" | jq -r '.updatedAt // ""')

                # CLA-gate detection. Google's `cla/google` check (and the
                # `cla` check used by some Google-org repos) fails on every
                # PR until the contributor signs the individual CLA at
                # https://cla.developers.google.com/about. Until then,
                # maintainers cannot review the diff at all — the PR sits
                # OPEN with zero human attention. Distinguish this from a
                # normal "open" outcome so:
                #   - rule-health doesn't count CLA-blocked PRs as "in flight"
                #   - stale_90d isn't emitted (the clock is on the contributor, not the maintainer)
                #   - the daily report can flag CLA-blocked PRs for the operator
                # Pattern: any check whose name matches /^cla(\/|$)/i and
                # conclusion is FAILURE.
                CLA_BLOCKED="false"
                if [ "$RAW_STATE" = "OPEN" ] && [ -n "$CHECKS_ARR" ] && [ "$CHECKS_ARR" != "null" ]; then
                  CLA_FAILED=$(printf '%s' "$CHECKS_ARR" \
                    | jq -r '[.[] | select((.name // "") | test("^cla(/|$)"; "i")) | select((.conclusion // "") == "FAILURE")] | length' 2>/dev/null || echo 0)
                  if [ "${CLA_FAILED:-0}" -gt 0 ]; then
                    CLA_BLOCKED="true"
                  fi
                fi

                # One string of non-bot comment bodies, used for pattern matching.
                COMMENTS_BODIES=$(printf '%s' "$COMMENTS_ARR" \
                  | jq -r '[.[] | select((.author.type // "") != "Bot") | .body] | join("\n")')

                # Classify outcome
                OUTCOME=""
                if [ -n "$MERGED_AT" ] && [ "$MERGED_AT" != "null" ]; then
                  OUTCOME="merged"
                elif [ "$RAW_STATE" = "OPEN" ]; then
                  if [ "$CLA_BLOCKED" = "true" ]; then
                    OUTCOME="cla_blocked"
                  else
                    OUTCOME="open"
                  fi
                elif [ "$RAW_STATE" = "CLOSED" ]; then
                  if [ -n "$COMMENTS_BODIES" ] && printf '%s' "$COMMENTS_BODIES" | grep -qziE "$APPLIED_PATTERNS"; then
                    OUTCOME="applied_separately"
                  else
                    OUTCOME="rejected"
                  fi
                fi

                # Rule-adoption signal (merged or closed — reuse the same comment body)
                if [ "$RULE_ADOPTED" = "false" ] && [ -n "$COMMENTS_BODIES" ] \
                   && printf '%s' "$COMMENTS_BODIES" | grep -qziE "$ADOPTION_PATTERNS"; then
                  RULE_ADOPTED="true"
                fi

                # Parse the nlpm-metadata block from PR body, per SCHEMAS §PR metadata block.
                # Legacy PRs submitted before the block was wired will return {}.
                META_JSON=$(printf '%s' "$PR_BODY" | python3 auditor/scripts/parse-pr-metadata.py 2>/dev/null || echo '{}')
                FP_ARR=$(printf '%s' "$META_JSON" | jq -c '[.findings[]?.fingerprint] | map(select(. != null))' 2>/dev/null || echo '[]')
                RULE_ARR=$(printf '%s' "$META_JSON" | jq -c '[.findings[]?.rule_id] | map(select(. != null))' 2>/dev/null || echo '[]')

                # Preserve backfilled fingerprints for legacy PRs. Without
                # this, track.yml wipes the registry's fingerprints every
                # 4h because it treats "no metadata block in PR body =
                # empty fingerprints" as authoritative. Backfilled records
                # live in the registry (via backfill-pr-fingerprints.py)
                # and carry `fingerprints_backfilled: true` as their
                # provenance flag — when both conditions hold, carry the
                # existing fingerprints/rule_ids forward.
                OLD_BACKFILLED=""
                if [ "$FP_ARR" = "[]" ]; then
                  OLD_BACKFILLED=$(printf '%s' "$OLD_PRS" | jq -r --argjson n "$pr_num" \
                    'map(select(.number == $n)) | .[0].fingerprints_backfilled // false' 2>/dev/null || echo "false")
                  if [ "$OLD_BACKFILLED" = "true" ]; then
                    FP_ARR=$(printf '%s' "$OLD_PRS" | jq -c --argjson n "$pr_num" \
                      'map(select(.number == $n)) | .[0].fingerprints // []')
                    RULE_ARR=$(printf '%s' "$OLD_PRS" | jq -c --argjson n "$pr_num" \
                      'map(select(.number == $n)) | .[0].rule_ids // []')
                    echo "  preserving $(echo "$FP_ARR" | jq length) backfilled fingerprint(s) for #$pr_num"
                  fi
                fi

                # Prior state from the registry snapshot — used to detect transitions.
                OLD_OUTCOME=$(printf '%s' "$OLD_PRS" | jq -r --argjson n "$pr_num" 'map(select(.number == $n)) | .[0].outcome // ""')
                OLD_STALE=$(printf '%s' "$OLD_PRS" | jq -r --argjson n "$pr_num" 'map(select(.number == $n)) | .[0].stale_90d_emitted // false')

                # Map outcome → pr_state per SCHEMAS §finding_outcome enum
                case "$OUTCOME" in
                  merged) PR_STATE="merged" ;;
                  rejected|applied_separately) PR_STATE="closed_unmerged" ;;
                  open) PR_STATE="open" ;;
                  cla_blocked) PR_STATE="cla_blocked" ;;
                  *) PR_STATE="" ;;
                esac

                # finding_outcome on every state transition (first observation also counts).
                if [ -n "$OUTCOME" ] && [ "$OLD_OUTCOME" != "$OUTCOME" ]; then
                  EVENT_DATA=$(jq -cn \
                    --arg pr "$REPO#$pr_num" \
                    --arg pr_state "$PR_STATE" \
                    --argjson fingerprints "$FP_ARR" \
                    --argjson rule_ids "$RULE_ARR" \
                    '{pr: $pr, pr_state: $pr_state, fingerprints: $fingerprints, rule_ids: $rule_ids}')
                  log_event "track" "finding_outcome" "$EVENT_DATA"
                fi

                # pr_comments_snapshot on first transition into closed_unmerged. Captures
                # the raw comment thread for a future classifier to turn into
                # maintainer_rejected / maintainer_pushback events.
                if [ -n "$OUTCOME" ] && [ "$OLD_OUTCOME" != "$OUTCOME" ] && [ "$PR_STATE" = "closed_unmerged" ]; then
                  # Cap each comment body at 4000 chars before snapshotting.
                  # Bounds prompt-injection blast radius in auditor-classify.yml
                  # (Haiku sees these comments verbatim). 4000 chars is ~1000 tokens
                  # — covers virtually every real maintainer reply while cutting
                  # off any attempt to stuff a long injection payload.
                  COMMENTS_CAPPED=$(printf '%s' "$COMMENTS_ARR" \
                    | jq -c '[.[] | .body = (if ((.body // "") | length) > 4000 then (.body[:4000] + "…[truncated]") else (.body // "") end)]')
                  # comments_hash is computed over the CAPPED payload so the
                  # classifier's dedup key matches what it actually sees.
                  COMMENTS_HASH="sha256:$(printf '%s' "$COMMENTS_CAPPED" | shasum -a 256 | awk '{print $1}')"
                  TS_NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                  touch auditor/disagreements.jsonl
                  jq -cn \
                    --arg event "pr_comments_snapshot" \
                    --arg ts "$TS_NOW" \
                    --arg pr "$REPO#$pr_num" \
                    --arg pr_state "$PR_STATE" \
                    --arg ch "$COMMENTS_HASH" \
                    --argjson fingerprints "$FP_ARR" \
                    --argjson rule_ids "$RULE_ARR" \
                    --argjson comments "$COMMENTS_CAPPED" \
                    '{event: $event, timestamp: $ts, pr: $pr, pr_state: $pr_state, comments_hash: $ch, fingerprints: $fingerprints, rule_ids: $rule_ids, comments: $comments}' \
                    >> auditor/disagreements.jsonl
                  echo "  pr_comments_snapshot emitted for $REPO#$pr_num"
                fi

                # stale_90d: open PR with no update in 90+ days, emitted at most once.
                # CLA-blocked PRs are excluded — the clock is on the contributor
                # to sign the CLA, not on the maintainer to review.
                STALE_EMITTED="$OLD_STALE"
                if [ "$OUTCOME" = "open" ] && [ "$OLD_STALE" != "true" ] \
                   && [ -n "$UPDATED_AT" ] && [ "$UPDATED_AT" != "null" ]; then
                  NOW_S=$(date -u +%s)
                  UPD_S=$(date -u -d "$UPDATED_AT" +%s 2>/dev/null \
                          || date -u -jf "%Y-%m-%dT%H:%M:%SZ" "$UPDATED_AT" +%s 2>/dev/null \
                          || echo "$NOW_S")
                  DAYS=$(( (NOW_S - UPD_S) / 86400 ))
                  if [ "$DAYS" -ge 90 ]; then
                    STALE_DATA=$(jq -cn \
                      --arg pr "$REPO#$pr_num" \
                      --arg pr_state "stale_90d" \
                      --argjson fingerprints "$FP_ARR" \
                      --argjson rule_ids "$RULE_ARR" \
                      '{pr: $pr, pr_state: $pr_state, fingerprints: $fingerprints, rule_ids: $rule_ids}')
                    log_event "track" "finding_outcome" "$STALE_DATA"
                    STALE_EMITTED="true"
                  fi
                fi

                # Preserve the backfilled-provenance flag across track runs.
                # Without carrying it forward, the NEXT track run's `if
                # FP_ARR == []` branch wouldn't know the PR was backfilled
                # (PR_DATA from GitHub has no such field) and would again
                # treat empty metadata as authoritative — wiping the
                # fingerprints on the subsequent 4h tick.
                BACKFILLED_FLAG="$OLD_BACKFILLED"
                [ -z "$BACKFILLED_FLAG" ] && BACKFILLED_FLAG="false"
                PR_ENRICHED=$(jq -cn \
                  --argjson data "$PR_DATA" \
                  --arg outcome "$OUTCOME" \
                  --argjson fingerprints "$FP_ARR" \
                  --argjson rule_ids "$RULE_ARR" \
                  --argjson stale "$STALE_EMITTED" \
                  --argjson backfilled "$BACKFILLED_FLAG" \
                  '$data + {outcome: $outcome, fingerprints: $fingerprints, rule_ids: $rule_ids, stale_90d_emitted: $stale} + (if $backfilled then {fingerprints_backfilled: true} else {} end)')
                ITEMS=$(echo "$ITEMS" | jq --argjson pr "$PR_ENRICHED" '. + [$pr]')
                sleep 0.5
              done
              PRS="$ITEMS"
            fi

            # Also scan any upstream tracking issues we filed (titled "NLPM audit..." per
            # auditor-contribute.yml's convention). Jeremy's hardening-PR announcement was
            # on his repo's issue #540, not on the PR comments, so PR-only scanning missed it.
            if [ "$RULE_ADOPTED" = "false" ]; then
              UPSTREAM_ISSUES=$(gh api "search/issues?q=repo:$REPO+in:title+NLPM" \
                --jq '.items[] | .number' 2>/dev/null | head -5)
              for up_issue in $UPSTREAM_ISSUES; do
                UP_COMMENTS=$(gh api "repos/$REPO/issues/$up_issue/comments" \
                  --jq '[.[] | select(.user.type != "Bot") | .body] | join("\n")' 2>/dev/null || echo "")
                if [ -n "$UP_COMMENTS" ] && printf '%s' "$UP_COMMENTS" | grep -qziE "$ADOPTION_PATTERNS"; then
                  RULE_ADOPTED="true"
                  break
                fi
                sleep 0.5
              done
            fi

            MERGED=$(echo "$PRS" | jq '[.[] | select(.outcome == "merged")] | length')
            APPLIED=$(echo "$PRS" | jq '[.[] | select(.outcome == "applied_separately")] | length')
            REJECTED=$(echo "$PRS" | jq '[.[] | select(.outcome == "rejected")] | length')
            OPEN=$(echo "$PRS" | jq '[.[] | select(.outcome == "open")] | length')
            CLA_BLOCKED_COUNT=$(echo "$PRS" | jq '[.[] | select(.outcome == "cla_blocked")] | length')
            # CLOSED used to be derived here; left as a comment because the
            # status echo below counts each outcome separately.
            echo "  $MERGED merged, $APPLIED applied-separately, $REJECTED rejected, $OPEN open, $CLA_BLOCKED_COUNT cla-blocked (rule_adopted=$RULE_ADOPTED)"

            jq --arg name "$REPO" --argjson prs "$PRS" --argjson rule_adopted "$RULE_ADOPTED" \
               '.repos[$name].prs = $prs | .repos[$name].rule_adopted = $rule_adopted' \
               auditor/registry/repos.json > /tmp/reg.json \
               && bash auditor/scripts/atomic-registry-write.sh

            # Promotion to "tracked" + case-study dispatch is a ONE-SHOT transition.
            # Only fire when the repo is still "contributed" — repos already "tracked"
            # or "complete" have passed this gate and must not re-trigger.
            #
            # CLA-blocked PRs count as "still in flight" — they may unblock once the
            # contributor signs the CLA, so don't promote prematurely.
            if [ "$CURRENT_STATUS" = "contributed" ] && [ "$OPEN" -eq 0 ] && [ "$CLA_BLOCKED_COUNT" -eq 0 ] && [ "$(echo "$PRS" | jq length)" -gt 0 ]; then
              jq --arg name "$REPO" '.repos[$name].status = "tracked"' \
                 auditor/registry/repos.json > /tmp/reg.json \
                 && bash auditor/scripts/atomic-registry-write.sh

              # A repo qualifies for a case study if any fix landed — either merged
              # directly or applied separately by the maintainer after closing the PR.
              ACCEPTED=$((MERGED + APPLIED))
              if [ "$ACCEPTED" -gt 0 ]; then
                jq --arg name "$REPO" '.repos[$name].case_study_candidate = true' \
                   auditor/registry/repos.json > /tmp/reg.json \
                   && bash auditor/scripts/atomic-registry-write.sh

                if [ "$ISSUE_NUM" != "null" ] && [ "$ISSUE_NUM" != "0" ]; then
                  gh issue comment "$ISSUE_NUM" \
                    --body "All PRs resolved. $MERGED merged, $APPLIED applied-separately, $REJECTED rejected. Ready for case study." \
                    2>/dev/null || true
                  gh issue edit "$ISSUE_NUM" --add-label "case-study-ready" 2>/dev/null || true
                  # GITHUB_TOKEN label events don't trigger other workflows (anti-recursion).
                  # Dispatch the case study workflow explicitly, same pattern as batch-processor.
                  gh workflow run auditor-case-study.yml \
                    -f repo="$REPO" \
                    -f issue_number="$ISSUE_NUM" 2>/dev/null || echo "WARNING: failed to dispatch case study for $REPO"
                fi
              fi
            fi
          done

      - name: Log and commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          source auditor/scripts/log-event.sh

          CONTRIBUTED=$(jq '[.repos | to_entries[] | select(.value.status == "contributed")] | length' auditor/registry/repos.json)
          TRACKED=$(jq '[.repos | to_entries[] | select(.value.status == "tracked")] | length' auditor/registry/repos.json)
          CASE_READY=$(jq '[.repos | to_entries[] | select(.value.case_study_candidate == true)] | length' auditor/registry/repos.json)
          RULE_ADOPTED=$(jq '[.repos | to_entries[] | select(.value.rule_adopted == true)] | length' auditor/registry/repos.json)

          log_event "track" "status_check" "{\"contributed\": $CONTRIBUTED, \"tracked\": $TRACKED, \"case_study_ready\": $CASE_READY, \"rule_adopted\": $RULE_ADOPTED}"

          git add auditor/registry/repos.json auditor/logs/events.jsonl auditor/disagreements.jsonl
          bash auditor/scripts/guard-protected-paths.sh || exit 1
          bash auditor/scripts/commit-via-pr.sh \
            "track: $(date +%Y-%m-%d) — $TRACKED tracked, $CASE_READY case-study ready, $RULE_ADOPTED rule-adopted"
